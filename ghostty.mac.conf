# macOS-only keybind differences (shared binds live in ghostty.conf)

# All of these will be superceded by the performable ones below.
# keybind = super+m=esc:m
# keybind = super+j=esc:j
# keybind = super+h=esc:h
# keybind = super+k=esc:k
# keybind = super+l=esc:l

# So i can use muscle memory (cmd+. sends alt+.)
keybind = super+.=esc:.

keybind = super+1=esc:1
keybind = super+2=esc:2
keybind = super+3=esc:3
keybind = super+4=esc:4
keybind = super+5=esc:5
keybind = super+6=esc:6
keybind = super+7=esc:7
keybind = super+8=esc:8
keybind = super+9=esc:9
keybind = super+0=esc:0

# Match Alacritty's Command+F10 encodings.
keybind = super+f10=text:\x1b[21;3~
keybind = shift+super+f10=text:\x1b[21;4~

# Do not emit esc:f for Option+Right; reserve esc:f for explicit Opt+F.
keybind = alt+arrow_right=unbind

# Keep Cmd+Left as a Home key instead of Ghostty's Ctrl+A default so Ctrl+A stays free for tmux prefixing.
keybind = super+arrow_left=text:\x1b[H
keybind = super+arrow_right=text:\x1b[F

# Font size controls on macOS stay on Option/Alt.
keybind = alt+==increase_font_size:1
keybind = alt++=increase_font_size:1
keybind = alt+-=decrease_font_size:1
keybind = alt+0=reset_font_size

# Pane resize on Option/Alt.
keybind = performable:super+h=resize_split:left,10
# Currently doing the chain which is not really correct but workable still as a workaround while
# https://github.com/ghostty-org/ghostty/discussions/11355 resolves.
keybind = chain=esc:h
keybind = performable:super+j=resize_split:down,15
keybind = chain=esc:j
keybind = performable:super+k=resize_split:up,15
keybind = chain=esc:k
keybind = performable:super+l=resize_split:right,10
keybind = chain=esc:l
keybind = performable:super+m=toggle_split_zoom
keybind = chain=esc:m

# Pass through for apps like Neovim while keeping bare Alt+L for Ghostty split resizing.
keybind = shift+alt+l=esc:l

# Optional: create splits
keybind = ctrl+alt+shift+h=new_split:left
keybind = ctrl+alt+shift+j=new_split:down
keybind = ctrl+alt+shift+k=new_split:up
keybind = ctrl+alt+shift+l=new_split:right
keybind = ctrl+alt+enter=toggle_split_zoom

# Need to duplicate the alt binds for muscle memory. we generally will want to fill these out to override if i want to ever assign
# yet other binds to the opt (alt) versions of these. For now, we simply flesh out the ones i use


