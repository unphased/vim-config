# Config generated by Ghostty Config

cursor-color = #00ff00
mouse-hide-while-typing = true
macos-non-native-fullscreen = visible-menu

# --- Pane (split) navigation (tmux-style, no-prefix) ---
keybind = performable:ctrl+h=goto_split:left
keybind = performable:ctrl+j=goto_split:down
keybind = performable:ctrl+k=goto_split:up
keybind = performable:ctrl+l=goto_split:right

# Shift+Enter just sends alt+enter
keybind = shift+enter=text:\x1b\r

# Pass ctrl+pgup/pgdn through to tmux for pane navigation
keybind = performable:ctrl+page_up=previous_tab
keybind = performable:ctrl+page_down=next_tab

# Platform-specific bind selector (machine-local).
config-file = ?/Users/slu/.vim/ghostty.platform.conf
