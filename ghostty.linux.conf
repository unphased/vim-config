# Linux-only keybind differences (shared binds live in ghostty.conf)

keybind = alt+m=esc:m
keybind = alt+j=esc:j
keybind = alt+h=esc:h
keybind = alt+k=esc:k
keybind = alt+l=esc:l
keybind = alt+1=esc:1
keybind = alt+2=esc:2
keybind = alt+3=esc:3
keybind = alt+4=esc:4
keybind = alt+5=esc:5
keybind = alt+6=esc:6
keybind = alt+7=esc:7
keybind = alt+8=esc:8
keybind = alt+9=esc:9
keybind = alt+0=esc:0

# Font size controls on Linux use Super to keep Alt for meta bindings.
keybind = shift+alt+==increase_font_size:1
keybind = shift+alt++=increase_font_size:1
keybind = shift+alt+-=decrease_font_size:1
keybind = shift+alt+0=reset_font_size

# Pane resize on Super to avoid Alt conflicts.
keybind = performable:super+h=resize_split:left,10
keybind = performable:super+j=resize_split:down,15
keybind = performable:super+k=resize_split:up,15
keybind = performable:super+l=resize_split:right,10
keybind = performable:super+m=toggle_split_zoom

# Pass through for apps like Neovim while keeping bare Super+L for Ghostty split resizing.
keybind = shift+super+l=esc:l

# Optional: create splits
keybind = ctrl+super+shift+h=new_split:left
keybind = ctrl+super+shift+j=new_split:down
keybind = ctrl+super+shift+k=new_split:up
keybind = ctrl+super+shift+l=new_split:right
keybind = ctrl+super+enter=toggle_split_zoom

# Ghostty quick terminal is disabled on GNOME/Mutter: on Linux, Ghostty
# requires a Wayland compositor with wlr-layer-shell-v1 for this action.
# GNOME can register the global shortcut portal, but cannot show this window.
# keybind = global:shift+alt+b=toggle_quick_terminal
